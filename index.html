        let currentTab = 'cardofday';
        let selectedTemplate = null;
        let currentEnglishText = '';

        const sectionTitles = {
            jokes: '😄 Юмор про Таро',
            education: '📚 Обучающий контент',
            interactive: '🎲 Интерактивные посты'
        };

        function switchTab(tab) {
            currentTab = tab;
            
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('cardofday-section').style.display = tab === 'cardofday' ? 'block' : 'none';
            document.getElementById('templates-section').style.display = tab === 'cardofday' ? 'none' : 'block';
            
            if (tab !== 'cardofday') {
                document.getElementById('section-title-text').textContent = sectionTitles[tab];
                renderTemplates();
                clearSelection();
            }
        }

        function renderTemplates() {
            const container = document.getElementById('templates-container');
            const items = templates[currentTab];
            
            container.innerHTML = items.map((item, index) => `
                <div class="template-item" onclick="selectTemplate(${index})">
                    <div class="template-title">${item.en.split('\n')[0]}</div>
                    <div class="template-preview">${item.en.substring(0, 80)}...</div>
                </div>
            `).join('');
        }

        function selectTemplate(index) {
            selectedTemplate = index;
            const template = templates[currentTab][index];
            
            document.querySelectorAll('.template-item').forEach((item, i) => {
                item.classList.toggle('selected', i === index);
            });
            
            document.getElementById('bilingual-preview').style.display = 'block';
            document.getElementById('post-content').innerHTML = `
                <div class="english-section">
                    <div class="language-label">English (будет скопировано)</div>
                    <div style="white-space: pre-wrap; line-height: 1.8; font-size: 1.05em;">${template.en}</div>
                </div>
                <div class="russian-section">
                    <div class="language-label">Русский перевод (для справки)</div>
                    <div style="white-space: pre-wrap; line-height: 1.8;">${template.ru}</div>
                </div>
            `;
            
            currentEnglishText = template.en;
            
            document.getElementById('bilingual-preview').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function drawCardOfDay() {
            const randomCard = allCards[Math.floor(Math.random() * allCards.length)];
            
            const resultDiv = document.getElementById('card-result');
            resultDiv.innerHTML = `
                <div class="card-name">🌟 ${randomCard.name}</div>
                <div class="card-meaning">
                    <div class="english-section">
                        <div class="language-label">English (будет скопировано)</div>
                        <div style="line-height: 1.9;">${randomCard.meaning}</div>
                    </div>
                    <div class="russian-section">
                        <div class="language-label">Русский перевод</div>
                        <div style="line-height: 1.8;">${randomCard.russian}</div>
                    </div>
                </div>
                <div style="margin-top: 25px; text-align: center;">
                    <button class="btn btn-primary" onclick="copyCardMeaning()">
                        📋 Скопировать английскую версию
                    </button>
                </div>
            `;
            resultDiv.style.display = 'block';
            
            currentEnglishText = `🌟 Card of the Day: ${randomCard.name}\n\n${randomCard.meaning}\n\n#tarot #cardoftheday #dailytarot #tarotreading #tarotwisdom`;
            
            resultDiv.scrollIntoView({ behavior: 'smooth' });
        }

        function copyToClipboard(text) {
            // Попытка 1: Современный API
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    showMessage('✅ Английская версия скопирована! Вставь в Telegram');
                }).catch(() => {
                    // Если не сработал, используем старый метод
                    fallbackCopy(text);
                });
            } else {
                // Запасной метод для старых браузеров и мобильных
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            // Создаём временное текстовое поле
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.top = '0';
            textarea.style.left = '0';
            textarea.style.width = '2em';
            textarea.style.height = '2em';
            textarea.style.padding = '0';
            textarea.style.border = 'none';
            textarea.style.outline = 'none';
            textarea.style.boxShadow = 'none';
            textarea.style.background = 'transparent';
            document.body.appendChild(textarea);
            
            // Выделяем и копируем
            textarea.focus();
            textarea.select();
            
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showMessage('✅ Английская версия скопирована! Вставь в Telegram');
                } else {
                    showMessage('⚠️ Не удалось скопировать. Выдели текст и скопируй вручную (долгое нажатие)');
                }
            } catch (err) {
                showMessage('⚠️ Скопируй текст вручную: долгое нажатие на текст → Копировать');
            }
            
            document.body.removeChild(textarea);
        }

        function copyCardMeaning() {
            if (!currentEnglishText) {
                showMessage('❌ Сначала вытяни карту!');
                return;
            }
            copyToClipboard(currentEnglishText);
        }

        function randomTemplate() {
            const allTemplates = templates[currentTab];
            const randomIndex = Math.floor(Math.random() * allTemplates.length);
            selectTemplate(randomIndex);
            
            document.querySelector('.templates-grid').scrollIntoView({ behavior: 'smooth' });
        }

        function copyEnglish() {
            if (!currentEnglishText) {
                showMessage('❌ Сначала выбери шаблон!');
                return;
            }
            copyToClipboard(currentEnglishText);
        }

        function clearSelection() {
            selectedTemplate = null;
            currentEnglishText = '';
            document.querySelectorAll('.template-item').forEach(item => {
                item.classList.remove('selected');
            });
            document.getElementById('bilingual-preview').style.display = 'none';
        }

        function showMessage(text) {
            const msgEl = document.getElementById('success-message');
            msgEl.textContent = text;
            msgEl.style.display = 'block';
            
            setTimeout(() => {
                msgEl.style.display = 'none';
            }, 3500);
        }
    </script>
